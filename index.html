<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horista - Início</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="incrementar()">
    <header>
        <img onclick="voltarInicio()" src="img/logo.svg" alt="logo">
    </header>
    <main>
        <main id="cadastro-mes">
            <h2>Selecione o mês</h2>
            <select name="" id="selecionar-mes">
                <option value="0">Janeiro</option>
                <option value="1">Fevereiro</option>
                <option value="2">Março</option>
                <option value="3">Abril</option>
                <option value="4">Maio</option>
                <option value="5">Junho</option>
                <option value="6">Julho</option>
                <option value="7">Agosto</option>
                <option value="8">Setembro</option>
                <option value="9">Outubro</option>
                <option value="10">Novembro</option>
                <option value="11">Dezembro</option>
            </select>
            <div class="opt">
                <button onclick="etapa1()" class="next">Próximo</button>
            </div>
        </main>
        <main id="cadastro-dias">
            <h2>Dias Trabalhados:</h2>
            <label id="mes-escolhido"></label>
            <div class="dias-btn">
                <button value="0">Seg</button>
                <button value="1">Ter</button>
                <button value="2">Qua</button>
                <button value="3">Qui</button>
                <button value="4">Sex</button>
                <button value="5">Sáb</button>
                <button value="6">Dom</button>
            </div>
            <div class="opt">
                <button onclick="voltar1()" id="voltar-mes" class="back">Voltar</button>
            <button onclick="etapa2()" id="confirmar-dias" class="next">Confirmar</button>
            </div>
        </main>
        <main id="cadastro-horas">
            <h2>Horas Trabalhadas</h2>
            <div id="segunda">
            <div class="row-info">
            <div class="column-info">
            <label id="dia">SEGUNDA</label>
            <label id="ocorrencias">4 Dias</label>
            </div>
            <div class="column-info">
                <div class="entrada">
                <input id="hora-seg" type="number" value="0">
                <a href="#" id="decrementar" data-id="decSeg">-1</a>
                <a href="#" id="incrementar" data-id="incSeg">+1</a>
                </div>
                <hr>
            </div>
            </div>
            </div>
            <div id="terca">
            <div class="row-info">
            <div class="column-info">
            <label id="dia">TERÇA</label>
            <label id="ocorrencias">5 Dias</label>
            </div>
            <div class="column-info">
                <div class="entrada">
                <input id="hora-ter" type="number" value="0">
                <a href="#" id="decrementar" data-id="decTer">-1</a>
                <a href="#" id="incrementar" data-id="incTer">+1</a>
                </div>
                <hr>
            </div>
            </div>
            </div>

            <div class="opt">
            <button class="back">Voltar</button>   
            <button class="next" onclick="etapaFinal()">Concluir</button>
            </div>
        </main>
    </main>
    <script src="js/logic.js"></script>
</body>
</html>
